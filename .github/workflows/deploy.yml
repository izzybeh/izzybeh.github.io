name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: ./moneybeh/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./moneybeh

      - name: Build project
        run: pnpm build
        working-directory: ./moneybeh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Assuming you are using Vite (dist). If using CRA, change to ./moneybeh/build
          path: ./moneybeh/dist 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4